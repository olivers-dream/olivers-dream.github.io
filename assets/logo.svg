<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle (night sky) -->
  <circle cx="24" cy="24" r="22" fill="url(#skyGrad)" opacity="0.95"/>
  <circle cx="24" cy="24" r="22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Crescent moon -->
  <circle cx="20" cy="18" r="9" fill="url(#moonGrad)" filter="url(#glow)"/>
  <circle cx="24" cy="15" r="8" fill="url(#skyGrad)"/>
  <!-- Stars -->
  <circle cx="33" cy="13" r="1.5" fill="#fde68a" filter="url(#starGlow)"/>
  <circle cx="36" cy="20" r="1" fill="#fde68a" filter="url(#starGlow)" opacity="0.8"/>
  <circle cx="30" cy="8" r="0.8" fill="#e0e7ff" filter="url(#starGlow)" opacity="0.7"/>
  <circle cx="38" cy="14" r="0.7" fill="#e0e7ff" opacity="0.6"/>
  <circle cx="34" cy="24" r="0.9" fill="#fde68a" opacity="0.7"/>
  <!-- Open book at bottom -->
  <path d="M12 32 Q18 29 24 31 Q30 29 36 32 L36 39 Q30 37 24 39 Q18 37 12 39 Z"
        fill="rgba(255,255,255,0.92)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <!-- Book spine -->
  <line x1="24" y1="31" x2="24" y2="39" stroke="rgba(124,58,237,0.3)" stroke-width="0.8"/>
  <!-- Subtle page lines -->
  <line x1="15" y1="34" x2="22" y2="33" stroke="rgba(124,58,237,0.15)" stroke-width="0.5"/>
  <line x1="15" y1="36" x2="22" y2="35" stroke="rgba(124,58,237,0.15)" stroke-width="0.5"/>
  <line x1="26" y1="33" x2="33" y2="34" stroke="rgba(124,58,237,0.15)" stroke-width="0.5"/>
  <line x1="26" y1="35" x2="33" y2="36" stroke="rgba(124,58,237,0.15)" stroke-width="0.5"/>
</svg>
